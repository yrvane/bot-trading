<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manscott Trading — VWAP Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060912;
      --panel:    #0c1020;
      --panel2:   #101628;
      --border:   #1a2240;
      --border2:  #243060;
      --text:     #c8d8ff;
      --muted:    #4a5a80;
      --green:    #00ffaa;
      --red:      #ff3a5c;
      --gold:     #ffc23a;
      --blue:     #3a8fff;
      --purple:   #8a5fff;
      --cyan:     #00e5ff;
      --radius:   8px;
      --sw:       230px;
      --glow-g:   0 0 16px rgba(0,255,170,.25);
      --glow-r:   0 0 16px rgba(255,58,92,.25);
      --glow-b:   0 0 16px rgba(58,143,255,.2);
      --glow-c:   0 0 20px rgba(0,229,255,.15);
    }

    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden; display: flex;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(58,143,255,.08) 0%, transparent 60%),
        linear-gradient(180deg, #060912 0%, #08101e 100%);
    }

    /* ── SCANLINES overlay ── */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:1000;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sw); min-width: var(--sw);
      background: linear-gradient(180deg, #0c1020 0%, #080e1a 100%);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 14px; gap: 20px;
      position: relative; overflow: hidden;
    }
    .sidebar::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity:.4;
    }
    .sidebar::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 120% 40% at 50% 0%, rgba(0,229,255,.04) 0%, transparent 60%);
    }

    .logo {
      display:flex; flex-direction:column; gap:2px; padding-bottom:4px;
    }
    .logo-main {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.35rem; font-weight: 700; letter-spacing: 2px; text-transform:uppercase;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      filter: drop-shadow(0 0 8px rgba(0,229,255,.4));
    }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem; color: var(--muted); letter-spacing: 3px; text-transform:uppercase;
    }

    .nav-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .58rem; font-weight: 600; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
      display:flex; align-items:center; gap:6px; margin-bottom:4px;
    }
    .nav-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .symbol-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer; background: transparent; color: var(--text);
      font-size: .85rem; width: 100%; text-align: left;
      transition: all .2s; position:relative; overflow:hidden;
    }
    .symbol-btn::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
      background: var(--cyan); opacity:0; transition:.2s;
    }
    .symbol-btn:hover { background: rgba(0,229,255,.04); border-color: var(--border); }
    .symbol-btn:hover::before { opacity:.5; }
    .symbol-btn.active {
      background: rgba(0,229,255,.06);
      border-color: rgba(0,229,255,.2);
      box-shadow: inset 0 0 20px rgba(0,229,255,.03), 0 0 12px rgba(0,229,255,.08);
    }
    .symbol-btn.active::before { opacity:1; }

    .sym-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; position:relative; }
    .sym-dot::after { content:''; position:absolute; inset:-3px; border-radius:50%; opacity:.3; animation: dotpulse 2s infinite; }
    @keyframes dotpulse { 0%,100%{transform:scale(1);opacity:.3} 50%{transform:scale(1.8);opacity:0} }
    .dot-xauusd { background:var(--gold); box-shadow:0 0 6px var(--gold); }
    .dot-xauusd::after { background:var(--gold); }
    .dot-us100  { background:var(--blue); box-shadow:0 0 6px var(--blue); }
    .dot-us100::after  { background:var(--blue); }
    .dot-us500  { background:var(--purple); box-shadow:0 0 6px var(--purple); }
    .dot-us500::after  { background:var(--purple); }

    .sym-info .ticker { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.92rem; letter-spacing:1px; }
    .sym-info .name   { font-size:.7rem; color:var(--muted); margin-top:1px; }
    .symbol-btn.active .ticker { color: var(--cyan); }

    .divider { border:none; border-top:1px solid var(--border); opacity:.5; }

    /* Stats */
    .stat-grid { display:flex; flex-direction:column; gap:8px; }
    .stat-card {
      background: linear-gradient(135deg, rgba(255,255,255,.02) 0%, rgba(0,229,255,.02) 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 13px; position:relative; overflow:hidden;
    }
    .stat-card::before {
      content:''; position:absolute; top:0; right:0; width:40px; height:40px;
      background: radial-gradient(circle, rgba(0,229,255,.06) 0%, transparent 70%);
    }
    .stat-card .sl {
      font-family:'Share Tech Mono',monospace;
      font-size:.58rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase;
    }
    .stat-card .sv { font-family:'Rajdhani',sans-serif; font-size:1.4rem; font-weight:700; margin-top:2px; }
    .sv.pos { color:var(--green); text-shadow: var(--glow-g); }
    .sv.neg { color:var(--red);   text-shadow: var(--glow-r); }
    .sv.neu { color:var(--text); }

    /* AT pill */
    .at-pill {
      display:flex; align-items:center; gap:8px; padding:9px 12px;
      background: rgba(0,255,170,.05);
      border: 1px solid rgba(0,255,170,.15);
      border-radius:6px; font-size:.72rem; color:var(--green);
      font-family:'Share Tech Mono',monospace; letter-spacing:.05em;
      box-shadow: inset 0 0 20px rgba(0,255,170,.02);
    }
    .at-dot { width:7px;height:7px;border-radius:50%;background:var(--green);
              box-shadow:0 0 6px var(--green); animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.2} }

    /* ── MAIN ── */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* Topbar */
    .topbar {
      display:flex; align-items:center; gap:16px; padding:12px 20px;
      background: linear-gradient(90deg, #0c1020 0%, #080e18 100%);
      border-bottom:1px solid var(--border); flex-shrink:0;
      position:relative;
    }
    .topbar::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,.3), transparent);
    }

    .sym-label {
      font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700;
      letter-spacing:2px; color:var(--muted); text-transform:uppercase;
    }
    .price-big {
      font-family:'Rajdhani',sans-serif; font-size:2.1rem; font-weight:700;
      letter-spacing:-1px; color:var(--text);
      text-shadow: 0 0 20px rgba(200,216,255,.2);
    }
    .price-sub { font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--muted); margin-top:2px; }

    .vwap-chip {
      padding:5px 12px;
      background: rgba(255,194,58,.06);
      border:1px solid rgba(255,194,58,.2);
      border-radius:4px; font-family:'Share Tech Mono',monospace;
      font-size:.7rem; color:var(--gold);
      box-shadow: 0 0 12px rgba(255,194,58,.1);
    }

    .topbar-right { margin-left:auto; display:flex; gap:6px; align-items:center; }

    .tf-btn {
      padding:5px 12px; border-radius:4px; background:transparent;
      border:1px solid var(--border); color:var(--muted);
      font-family:'Share Tech Mono',monospace; font-size:.7rem;
      cursor:pointer; transition:all .15s; letter-spacing:.05em;
    }
    .tf-btn:hover { border-color:var(--border2); color:var(--text); }
    .tf-btn.active {
      background: rgba(0,229,255,.08); color:var(--cyan);
      border-color:rgba(0,229,255,.3);
      box-shadow: 0 0 10px rgba(0,229,255,.1);
    }

    /* Signal bar */
    .signal-bar {
      padding:9px 20px; text-align:center;
      font-family:'Share Tech Mono',monospace; font-size:.75rem;
      flex-shrink:0; border-bottom:1px solid var(--border); transition:.3s;
      letter-spacing:.08em;
    }
    .signal-bar.wait  { background:rgba(255,255,255,.01); color:var(--muted); }
    .signal-bar.long  {
      background: linear-gradient(90deg, rgba(0,255,170,.04), rgba(0,255,170,.07), rgba(0,255,170,.04));
      color:var(--green); border-color:rgba(0,255,170,.2);
      text-shadow: var(--glow-g);
    }
    .signal-bar.short {
      background: linear-gradient(90deg, rgba(255,58,92,.04), rgba(255,58,92,.07), rgba(255,58,92,.04));
      color:var(--red); border-color:rgba(255,58,92,.2);
      text-shadow: var(--glow-r);
    }

    /* Content */
    .content { flex:1; display:flex; overflow:hidden; }
    .chart-zone { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    #chart { flex:1; }

    /* Corner decorations on chart */
    .chart-zone::before, .chart-zone::after {
      content:''; position:absolute; width:20px; height:20px; z-index:10; pointer-events:none;
    }
    .chart-zone::before { top:8px; left:8px; border-top:1px solid var(--cyan); border-left:1px solid var(--cyan); opacity:.4; }
    .chart-zone::after  { top:8px; right:8px; border-top:1px solid var(--cyan); border-right:1px solid var(--cyan); opacity:.4; }

    /* Right panel */
    .right-panel {
      width:320px; min-width:320px; display:flex; flex-direction:column;
      border-left:1px solid var(--border); overflow:hidden;
      background: linear-gradient(180deg, #0a0f1e 0%, #080c18 100%);
    }
    .panel-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
    .ptab {
      flex:1; padding:11px; text-align:center;
      font-family:'Share Tech Mono',monospace; font-size:.7rem; letter-spacing:.08em;
      cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:.15s;
      text-transform:uppercase;
    }
    .ptab.active { color:var(--cyan); border-color:var(--cyan); }

    .panel-body {
      flex:1; overflow-y:auto; padding:12px;
      display:flex; flex-direction:column; gap:8px;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    .panel-body::-webkit-scrollbar { width:3px; }
    .panel-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    /* Position card */
    .pos-card {
      background: linear-gradient(135deg, rgba(255,255,255,.02) 0%, rgba(0,229,255,.015) 100%);
      border:1px solid var(--border); border-radius:var(--radius);
      padding:12px 14px; position:relative; overflow:hidden;
    }
    .pos-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity:.3;
    }
    .pos-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .pos-type {
      padding:3px 10px; border-radius:3px;
      font-family:'Rajdhani',sans-serif; font-size:.75rem; font-weight:700; letter-spacing:1px;
    }
    .pos-type.long  { background:rgba(0,255,170,.12); color:var(--green); border:1px solid rgba(0,255,170,.2); box-shadow:var(--glow-g); }
    .pos-type.short { background:rgba(255,58,92,.12);  color:var(--red);   border:1px solid rgba(255,58,92,.2);  box-shadow:var(--glow-r); }
    .pos-sym { font-family:'Share Tech Mono',monospace; font-size:.7rem; color:var(--muted); }
    .pos-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .pos-item .l { font-family:'Share Tech Mono',monospace; font-size:.58rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
    .pos-item .v { font-family:'Rajdhani',sans-serif; font-size:.95rem; font-weight:600; margin-top:3px; }

    /* Trade rows */
    .trade-row {
      display:grid; grid-template-columns:72px 58px 48px 82px 82px 64px;
      gap:4px; align-items:center;
      padding:8px 2px; border-bottom:1px solid rgba(26,34,64,.5); font-size:.72rem;
    }
    .trade-row:last-child { border-bottom:none; }
    .badge {
      padding:2px 7px; border-radius:3px;
      font-family:'Rajdhani',sans-serif; font-size:.7rem; font-weight:700;
      letter-spacing:.5px; display:inline-block;
    }
    .badge.long  { background:rgba(0,255,170,.1); color:var(--green); border:1px solid rgba(0,255,170,.15); }
    .badge.short { background:rgba(255,58,92,.1);  color:var(--red);   border:1px solid rgba(255,58,92,.15); }
    .badge.open  { background:rgba(0,229,255,.1);  color:var(--cyan);  border:1px solid rgba(0,229,255,.15); }
    .win  { color:var(--green); font-weight:600; font-family:'Rajdhani',sans-serif; }
    .loss { color:var(--red);   font-weight:600; font-family:'Rajdhani',sans-serif; }
    .th   { font-family:'Share Tech Mono',monospace; font-size:.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }

    /* Toast */
    .toast-wrap { position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; z-index:999; }
    .toast {
      padding:10px 16px; border-radius:6px;
      font-family:'Share Tech Mono',monospace; font-size:.75rem;
      animation:slideIn .3s ease; letter-spacing:.04em;
      backdrop-filter: blur(10px);
    }
    .toast.ok  { background:rgba(0,255,170,.1); border:1px solid rgba(0,255,170,.25); color:var(--green); box-shadow:var(--glow-g); }
    .toast.err { background:rgba(255,58,92,.1);  border:1px solid rgba(255,58,92,.25);  color:var(--red);   box-shadow:var(--glow-r); }
    @keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:none} }

    /* ── MODAL ── */
    .modal-overlay {
      position:fixed; inset:0; z-index:9000;
      background:rgba(4,6,14,.85); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .25s;
    }
    .modal-overlay.show { opacity:1; pointer-events:all; }

    .modal {
      background: linear-gradient(160deg, #0e1530 0%, #090d1e 100%);
      border:1px solid var(--border2); border-radius:12px;
      padding:28px; width:380px; max-width:92vw;
      position:relative; overflow:hidden;
      transform:translateY(20px) scale(.96); transition:transform .25s;
      box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 30px rgba(0,229,255,.06);
    }
    .modal-overlay.show .modal { transform:none; }

    /* Animated border top */
    .modal::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--blue), transparent);
      animation: scanline 3s linear infinite;
    }
    @keyframes scanline { 0%{opacity:1} 50%{opacity:.3} 100%{opacity:1} }

    /* Corner accents */
    .modal::after {
      content:''; position:absolute; bottom:0; right:0; width:40px; height:40px;
      border-bottom:1px solid rgba(0,229,255,.3); border-right:1px solid rgba(0,229,255,.3);
      border-radius:0 0 12px 0;
    }

    .modal-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; }
    .modal-badge {
      display:inline-flex; align-items:center; gap:7px;
      padding:5px 14px; border-radius:4px;
      font-family:'Rajdhani',sans-serif; font-size:.85rem; font-weight:700; letter-spacing:2px;
    }
    .modal-badge.long  { background:rgba(0,255,170,.1); color:var(--green); border:1px solid rgba(0,255,170,.25); box-shadow:var(--glow-g); }
    .modal-badge.short { background:rgba(255,58,92,.1);  color:var(--red);   border:1px solid rgba(255,58,92,.25);  box-shadow:var(--glow-r); }
    .modal-badge .blink { width:7px;height:7px;border-radius:50%;animation:pulse 1s infinite; }
    .modal-badge.long  .blink { background:var(--green); box-shadow:0 0 6px var(--green); }
    .modal-badge.short .blink { background:var(--red);   box-shadow:0 0 6px var(--red); }

    .modal-close {
      background:transparent; border:1px solid var(--border); color:var(--muted);
      width:28px; height:28px; border-radius:4px; cursor:pointer; font-size:1rem;
      display:flex; align-items:center; justify-content:center; transition:.15s;
    }
    .modal-close:hover { border-color:var(--red); color:var(--red); }

    .modal-sym {
      font-family:'Rajdhani',sans-serif; font-size:1.8rem; font-weight:700;
      letter-spacing:3px; margin-bottom:2px;
    }
    .modal-time { font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--muted); margin-bottom:20px; letter-spacing:.08em; }

    .modal-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
    .mg-item {
      background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:6px; padding:10px 12px;
    }
    .mg-item .l { font-family:'Share Tech Mono',monospace; font-size:.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; }
    .mg-item .v { font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700; }
    .mg-item.sl .v { color:var(--red);   text-shadow:var(--glow-r); }
    .mg-item.tp .v { color:var(--green); text-shadow:var(--glow-g); }

    .modal-rr {
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(255,194,58,.05); border:1px solid rgba(255,194,58,.15);
      border-radius:6px; padding:10px 14px; margin-bottom:18px;
    }
    .modal-rr .label { font-family:'Share Tech Mono',monospace; font-size:.65rem; color:var(--muted); letter-spacing:.06em; }
    .modal-rr .value { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; color:var(--gold); text-shadow:0 0 10px rgba(255,194,58,.3); }

    .modal-btn {
      width:100%; padding:13px; border-radius:6px; border:none;
      font-family:'Rajdhani',sans-serif; font-size:.95rem; font-weight:700;
      letter-spacing:2px; text-transform:uppercase; cursor:pointer;
      transition:all .15s; position:relative; overflow:hidden;
    }
    .modal-btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,.05); opacity:0; transition:.15s; }
    .modal-btn:hover::after { opacity:1; }
    .modal-btn:active { transform:scale(.98); }
    .modal-btn.long  { background: linear-gradient(90deg, #007a4d, #00cc80); color:#001a10; box-shadow:var(--glow-g); }
    .modal-btn.short { background: linear-gradient(90deg, #a01030, #ff3a5c); color:#fff;    box-shadow:var(--glow-r); }
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-main">Manscott</div>
    <div class="logo-sub">VWAP · Auto Trading</div>
  </div>

  <div>
    <div class="nav-label">Marchés</div>
    <button class="symbol-btn active" data-sym="XAUUSD">
      <span class="sym-dot dot-xauusd"></span>
      <div class="sym-info"><div class="ticker">XAUUSD</div><div class="name">Or / Dollar</div></div>
    </button>
    <button class="symbol-btn" data-sym="US100">
      <span class="sym-dot dot-us100"></span>
      <div class="sym-info"><div class="ticker">US100</div><div class="name">Nasdaq 100</div></div>
    </button>
    <button class="symbol-btn" data-sym="US500">
      <span class="sym-dot dot-us500"></span>
      <div class="sym-info"><div class="ticker">US500</div><div class="name">S&amp;P 500</div></div>
    </button>
  </div>

  <hr class="divider">

  <div class="stat-grid">
    <div class="stat-card">
      <div class="sl">Win Rate</div>
      <div class="sv neu" id="winRate">—</div>
    </div>
    <div class="stat-card">
      <div class="sl">Trades</div>
      <div class="sv neu" id="totalTrades">—</div>
    </div>
    <div class="stat-card">
      <div class="sl">PnL Total</div>
      <div class="sv neu" id="totalPnl">—</div>
    </div>
  </div>

  <div class="at-pill"><span class="at-dot"></span>AUTO-TRADING ACTIF</div>
</div>

<!-- ══ MAIN ══ -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="sym-label" id="symLabel">XAUUSD</div>
      <div class="price-big" id="currentPrice">—</div>
      <div class="price-sub">vs VWAP : <span id="priceVsVwap">—</span></div>
    </div>
    <div class="vwap-chip">VWAP &nbsp;<span id="vwapValue">—</span></div>
    <div class="topbar-right">
      <button class="tf-btn" data-tf="M5">M5</button>
      <button class="tf-btn" data-tf="M15">M15</button>
      <button class="tf-btn active" data-tf="H1">H1</button>
      <button class="tf-btn" data-tf="H4">H4</button>
      <button class="tf-btn" data-tf="D1">D1</button>
    </div>
  </div>

  <div class="signal-bar wait" id="signalBar">[ SYSTÈME EN ATTENTE DE SIGNAL ]</div>

  <div class="content">
    <div class="chart-zone">
      <div id="chart"></div>
    </div>

    <div class="right-panel">
      <div class="panel-tabs">
        <div class="ptab active" data-tab="positions">Positions</div>
        <div class="ptab" data-tab="history">Historique</div>
      </div>
      <div class="panel-body" id="tab-positions">
        <div id="positionsList" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>
      <div class="panel-body" id="tab-history" style="display:none;">
        <div class="trade-row">
          <span class="th">Date</span><span class="th">Sym</span><span class="th">Dir</span>
          <span class="th">Entrée</span><span class="th">Sortie</span><span class="th">PnL</span>
        </div>
        <div id="tradesList"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="signalModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-badge long" id="modalBadge">
        <span class="blink"></span>
        <span id="modalDir">LONG</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-sym" id="modalSym">XAUUSD</div>
    <div class="modal-time" id="modalTime">—</div>
    <div class="modal-grid">
      <div class="mg-item"><div class="l">Entrée</div><div class="v" id="modalEntry">—</div></div>
      <div class="mg-item sl"><div class="l">Stop Loss</div><div class="v" id="modalSL">—</div></div>
      <div class="mg-item tp"><div class="l">Take Profit</div><div class="v" id="modalTP">—</div></div>
    </div>
    <div class="modal-rr">
      <span class="label">RATIO RISQUE / RÉCOMPENSE</span>
      <span class="value" id="modalRR">—</span>
    </div>
    <button class="modal-btn long" id="modalBtn" onclick="closeModal()">CONFIRMER — SUIVRE LE TRADE</button>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
let currentSymbol = 'XAUUSD';
let chart, candleSeries, vwapSeries;
let ws, wsRetryTimer;
let lastPrice = null;

// ─── Tabs ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.ptab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.ptab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    const tab = t.dataset.tab;
    document.getElementById('tab-positions').style.display = tab === 'positions' ? 'flex' : 'none';
    document.getElementById('tab-history').style.display   = tab === 'history'   ? 'flex' : 'none';
  });
});

// ─── Symbol switcher ─────────────────────────────────────────────────────────
document.querySelectorAll('.symbol-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSymbol = btn.dataset.sym;
    document.getElementById('symLabel').textContent = currentSymbol;
    lastPrice = null;
    document.getElementById('currentPrice').textContent = '—';
    document.getElementById('vwapValue').textContent = '—';
    document.getElementById('priceVsVwap').textContent = '—';
    // ⚠️ Recréer les séries pour remettre l'échelle à zéro
    resetChartSeries();
    loadHistory();
    reconnectWS();
  });
});

// ─── Timeframe buttons ────────────────────────────────────────────────────────
document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadHistory();
  });
});

function getInterval() {
  const active = document.querySelector('.tf-btn.active');
  const map = { M5:'5m', M15:'15m', H1:'1h', H4:'4h', D1:'1d' };
  return map[active?.dataset.tf] || '1h';
}

// ─── Chart ────────────────────────────────────────────────────────────────────
function initChart() {
  const el = document.getElementById('chart');
  chart = LightweightCharts.createChart(el, {
    width: el.clientWidth, height: el.clientHeight,
    layout: { background: { color: '#060912' }, textColor: '#4a5a80' },
    grid:   { vertLines: { color: '#0e1628' }, horzLines: { color: '#0e1628' } },
    timeScale: { borderColor: '#1a2240', timeVisible: true },
    rightPriceScale: { borderColor: '#1a2240' },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: 'rgba(0,229,255,.3)', labelBackgroundColor: '#0c1020' },
      horzLine: { color: 'rgba(0,229,255,.3)', labelBackgroundColor: '#0c1020' },
    }
  });
  createChartSeries();
  window.addEventListener('resize', () => {
    chart.applyOptions({ width: el.clientWidth, height: el.clientHeight });
  });
  loadHistory();
}

function createChartSeries() {
  candleSeries = chart.addCandlestickSeries({
    upColor: '#00ffaa', downColor: '#ff3a5c',
    borderUpColor: '#00ffaa', borderDownColor: '#ff3a5c',
    wickUpColor: '#00ffaa', wickDownColor: '#ff3a5c',
  });
  vwapSeries = chart.addLineSeries({
    color: '#ffc23a', lineWidth: 1.5, priceLineVisible: false,
    crosshairMarkerVisible: false,
  });
}

// ⚠️ Supprime et recrée les séries → remet l'échelle à zéro proprement
function resetChartSeries() {
  try { chart.removeSeries(candleSeries); } catch(_) {}
  try { chart.removeSeries(vwapSeries);   } catch(_) {}
  createChartSeries();
}

function loadHistory() {
  const interval = getInterval();
  fetch(`/api/history/${currentSymbol}?bars=300&interval=${interval}`)
    .then(r => r.json())
    .then(data => {
      if (data.error || !data.dates?.length) return;

      const candles = data.dates.map((d,i) => ({
        time: Math.floor(new Date(d).getTime() / 1000),
        open: data.open[i], high: data.high[i],
        low:  data.low[i],  close: data.close[i]
      })).filter(c => c.open && c.close && !isNaN(c.time));

      const vwap = data.dates.map((d,i) => ({
        time: Math.floor(new Date(d).getTime() / 1000),
        value: data.vwap[i]
      })).filter(v => v.value && !isNaN(v.value));

      candleSeries.setData(candles);
      vwapSeries.setData(vwap);
      chart.timeScale().fitContent();

      if (vwap.length) {
        document.getElementById('vwapValue').textContent = vwap.at(-1).value.toFixed(2);
      }
    })
    .catch(() => {});
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  if (ws) { try { ws.close(); } catch(_){} }
  ws = new WebSocket(`ws://127.0.0.1:8000/ws/${currentSymbol}`);
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'price')           handlePrice(msg.price);
      if (msg.type === 'new_trade')       handleNewTrade(msg.trade);
      if (msg.type === 'trade_closed')    handleClosed(msg);
      if (msg.type === 'position_update') refreshPositions();
    } catch(_) {}
  };
  ws.onclose = () => {
    clearTimeout(wsRetryTimer);
    wsRetryTimer = setTimeout(connectWS, 5000);
  };
}
function reconnectWS() { connectWS(); }

function handlePrice(price) {
  lastPrice = price;
  document.getElementById('currentPrice').textContent = price.toFixed(2);
  const vwap = parseFloat(document.getElementById('vwapValue').textContent);
  if (!isNaN(vwap)) {
    const diff = price - vwap;
    const el = document.getElementById('priceVsVwap');
    el.textContent = `${diff > 0 ? '+' : ''}${diff.toFixed(2)}`;
    el.style.color = diff >= 0 ? 'var(--green)' : 'var(--red)';
  }
}

function handleNewTrade(trade) {
  toast(`SIGNAL ${trade.type} @ ${(+trade.entry_price).toFixed(2)}`, 'ok');
  setSignal(trade.type, trade.entry_price, trade.sl, trade.tp);
  openModal(trade);
  refreshPositions();
  refreshTrades();
}

function handleClosed(msg) {
  const sign = msg.pnl >= 0 ? '+' : '';
  toast(`TRADE FERMÉ (${msg.reason}) · PnL ${sign}${(+msg.pnl).toFixed(2)}%`, msg.pnl >= 0 ? 'ok' : 'err');
  resetSignal();
  refreshPositions();
  refreshTrades();
}

// ─── Signal banner ────────────────────────────────────────────────────────────
function setSignal(type, entry, sl, tp) {
  const bar = document.getElementById('signalBar');
  const dir = type === 'LONG';
  bar.className = `signal-bar ${dir ? 'long' : 'short'}`;
  bar.innerHTML = `[ ${dir ? '▲ LONG' : '▼ SHORT'} OUVERT @ ${(+entry).toFixed(2)} · SL ${(+sl).toFixed(2)} · TP ${(+tp).toFixed(2)} ]`;
}
function resetSignal() {
  const bar = document.getElementById('signalBar');
  bar.className = 'signal-bar wait';
  bar.innerHTML = '[ SYSTÈME EN ATTENTE DE SIGNAL ]';
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(trade) {
  const isLong = trade.type === 'LONG';
  const entry = +trade.entry_price, sl = +trade.sl, tp = +trade.tp;
  const risk = Math.abs(entry - sl), reward = Math.abs(tp - entry);
  const rr = risk > 0 ? (reward / risk).toFixed(2) : '—';

  document.getElementById('modalBadge').className = `modal-badge ${isLong ? 'long' : 'short'}`;
  document.getElementById('modalDir').textContent   = trade.type;
  document.getElementById('modalSym').textContent   = trade.symbol || currentSymbol;
  document.getElementById('modalTime').textContent  = new Date().toLocaleString('fr-FR');
  document.getElementById('modalEntry').textContent = entry.toFixed(2);
  document.getElementById('modalSL').textContent    = sl.toFixed(2);
  document.getElementById('modalTP').textContent    = tp.toFixed(2);
  document.getElementById('modalRR').textContent    = `1 : ${rr}`;
  document.getElementById('modalBtn').className     = `modal-btn ${isLong ? 'long' : 'short'}`;
  document.getElementById('signalModal').classList.add('show');
}
function closeModal() {
  document.getElementById('signalModal').classList.remove('show');
}
document.getElementById('signalModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Positions ────────────────────────────────────────────────────────────────
function refreshPositions() {
  fetch('/api/positions').then(r => r.json()).then(positions => {
    const el = document.getElementById('positionsList');
    if (!positions.length) {
      el.innerHTML = '<div style="color:var(--muted);font-family:\'Share Tech Mono\',monospace;font-size:.7rem;text-align:center;padding:24px 0;letter-spacing:.08em;">[ AUCUNE POSITION OUVERTE ]</div>';
      return;
    }
    el.innerHTML = positions.map(p => {
      const isLong = p.type === 'LONG';
      const pnl = lastPrice
        ? (isLong ? (lastPrice - p.entry_price) / p.entry_price * 100
                  : (p.entry_price - lastPrice) / p.entry_price * 100)
        : null;
      return `
        <div class="pos-card">
          <div class="pos-header">
            <span class="pos-type ${isLong?'long':'short'}">${p.type}</span>
            <span class="pos-sym">${p.symbol}</span>
          </div>
          <div class="pos-grid">
            <div class="pos-item"><div class="l">Entrée</div><div class="v">${(+p.entry_price).toFixed(2)}</div></div>
            <div class="pos-item"><div class="l">SL</div><div class="v" style="color:var(--red)">${(+p.sl).toFixed(2)}</div></div>
            <div class="pos-item"><div class="l">TP</div><div class="v" style="color:var(--green)">${(+p.tp).toFixed(2)}</div></div>
          </div>
          ${pnl !== null ? `<div style="margin-top:10px;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:${pnl>=0?'var(--green)':'var(--red)'}">PnL flottant : ${pnl>=0?'+':''}${pnl.toFixed(2)}%</div>` : ''}
        </div>`;
    }).join('');
  }).catch(() => {});
}

// ─── Trades ───────────────────────────────────────────────────────────────────
function refreshTrades() {
  fetch('/api/trades').then(r => r.json()).then(trades => {
    const el = document.getElementById('tradesList');
    if (!trades.length) {
      el.innerHTML = '<div style="color:var(--muted);font-family:\'Share Tech Mono\',monospace;font-size:.7rem;text-align:center;padding:24px 0;">[ AUCUN TRADE ]</div>';
      updateStats([], 0, 0, 0); return;
    }
    const closed = trades.filter(t => t.status === 'closed');
    const wins = closed.filter(t => +t.pnl > 0).length;
    const totalPnl = closed.reduce((s,t) => s + (+t.pnl||0), 0);
    updateStats(closed, wins, totalPnl, trades.length);

    el.innerHTML = [...trades].reverse().slice(0,50).map(t => {
      const date = new Date(t.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const isOpen = t.status === 'open';
      const pnl = +t.pnl;
      const pnlTxt = isOpen ? '—' : `${pnl>=0?'+':''}${pnl.toFixed(2)}%`;
      return `
        <div class="trade-row">
          <span style="color:var(--muted);font-size:.65rem">${date}</span>
          <span>${t.symbol}</span>
          <span><span class="badge ${isOpen?'open':t.type.toLowerCase()}">${t.type}</span></span>
          <span>${(+t.entry_price).toFixed(2)}</span>
          <span>${isOpen?'<span style="color:var(--cyan)">Live</span>':(+t.exit_price).toFixed(2)}</span>
          <span class="${isOpen?'':(pnl>=0?'win':'loss')}">${pnlTxt}</span>
        </div>`;
    }).join('');
  }).catch(() => {});
}

function updateStats(closed, wins, totalPnl, total) {
  const wr = document.getElementById('winRate');
  const tt = document.getElementById('totalTrades');
  const tp = document.getElementById('totalPnl');
  wr.textContent = closed.length ? `${((wins/closed.length)*100).toFixed(0)}%` : '—';
  wr.className = `sv ${closed.length ? (wins/closed.length>=.5?'pos':'neg') : 'neu'}`;
  tt.textContent = total || '—';
  tp.textContent = totalPnl ? `${totalPnl>=0?'+':''}${totalPnl.toFixed(2)}%` : '—';
  tp.className = `sv ${totalPnl>=0?'pos':'neg'}`;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initChart();
  connectWS();
  refreshPositions();
  refreshTrades();
  setInterval(() => { refreshPositions(); refreshTrades(); }, 10000);
  setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      fetch(`/api/price/${currentSymbol}`)
        .then(r => r.json())
        .then(d => d.price && handlePrice(d.price))
        .catch(() => {});
    }
  }, 5000);
});
</script>
</body>
</html>
